<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Quiz</title>
</head>
<body>
<h1>Edit Quiz Question</h1>

<form th:action="@{/editQuiz}" th:object="${quiz}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <input type="hidden" name="_method" value="PUT" />

    <input type="hidden" th:field="*{id}" />

    <div>
        <label>Question Text</label><br/>
        <input type="text" th:field="*{questionText}" required />
    </div>

    <div>
        <label>Options (comma-separated)</label><br/>
        <input type="text" th:field="*{optionsText}" required />
    </div>

    <div>
        <label>Correct Answer</label><br/>
        <input type="text" th:field="*{correctAnswer}" required />
    </div>

    <button type="submit">Save</button>
</form>

<hr/>

<form th:action="@{/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <button type="submit">Logout</button>
</form>
</body>
</html>
